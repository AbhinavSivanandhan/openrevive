services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./compose/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    env_file:
      - .env
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
          echo "Waiting for MinIO..."
          sleep 2
        done
        mc mb --ignore-existing local/${S3_BUCKET}
        mc anonymous set none local/${S3_BUCKET}
        echo "MinIO bucket is ready."

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    working_dir: /workspace/services/api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      TEST_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/openrevive_test
    command: >
      sh -c "uv sync --frozen --no-install-project &&
      uv run --frozen fastapi dev app/main.py --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/workspace/services/api
      - api_venv:/workspace/services/api/.venv
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    working_dir: /workspace/services/api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      WORKER_LEASE_SECONDS: "60"
      WORKER_IDLE_POLL_SECONDS: "1.0"
      WORKER_MAX_RESPONSE_BYTES: "2000000"
      LOG_LEVEL: INFO
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_REGION_NAME: us-east-1
    command: >
      sh -c "exec uv run --frozen python -m app.crawler.worker_main"
    depends_on:
      postgres:
        condition: service_healthy
    stop_grace_period: 30s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    working_dir: /workspace
    environment:
      API_INTERNAL_URL: http://api:8000
    command: >
      sh -c "pnpm install --frozen-lockfile &&
      pnpm dev --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/workspace
      - web_node_modules:/workspace/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_venv:
  web_node_modules:
